name: Sync AMFI Portfolio Data

# Monthly: runs on the 11th at 06:00 UTC — a few days after month-end
# disclosures are typically published (SEBI mandates within 10 days).
# Also dispatchable manually for testing or on-demand refresh.
#
# Runs against both DEV and PROD: the AMFI portfolio composition data is
# identical across environments, and keeping DEV current makes feature work
# realistic. The two jobs run in parallel and a failure in one doesn't
# affect the other.
on:
  schedule:
    - cron: '0 6 11 * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to sync (default: both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - dev
          - prod

jobs:
  sync-dev:
    name: Sync dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'both' ||
      github.event.inputs.environment == 'dev'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run AMFI sync (dev)
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY_DEV }}
        run: node scripts/sync-amfi-portfolios.mjs
      # Single PostHog event per job — closes the audit Topic 15 alerting gap.
      # Event fires on both success and failure; the `outcome` property +
      # workflow_run_url let dashboards filter and link straight to logs.
      - name: Report sync outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "amfi_sync_completed", distinct_id: "system:amfi-sync-dev", properties: {$lib: "github-actions", environment: "dev", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')' \
            || echo "[posthog] capture failed; not failing the job"

  sync-prod:
    name: Sync prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'both' ||
      github.event.inputs.environment == 'prod'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run AMFI sync (prod)
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY_PROD }}
        run: node scripts/sync-amfi-portfolios.mjs
      - name: Report sync outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "amfi_sync_completed", distinct_id: "system:amfi-sync-prod", properties: {$lib: "github-actions", environment: "production", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')' \
            || echo "[posthog] capture failed; not failing the job"
