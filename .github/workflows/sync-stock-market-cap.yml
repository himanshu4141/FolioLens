name: Sync Stock Market Cap

# Manually triggers the `sync-stock-market-cap` Edge Function. The function
# already runs monthly via pg_cron on the 1st at 00:30 UTC (see
# supabase/migrations/20260514100001_sync_stock_market_cap_cron.sql) — this
# wrapper exists so an operator can refresh on demand without juggling the
# service-role key.
#
# When to use:
#   - Immediately after the M6 migration lands in prod, to seed the
#     `stock_market_cap` table without waiting 30+ days for the cron.
#   - When AMFI publishes a new half-yearly list mid-month (Jan / Jul) and
#     we don't want to wait until the 1st of next month for the cron.
#   - When debugging a `sync_failed` PostHog event — re-running here
#     produces a fresh run with a linkable Actions log.
#
# The Edge Function is deployed with --no-verify-jwt (same as every other
# cron-triggered function), so this workflow doesn't need the service-role
# key; a plain POST is enough. Idempotency is enforced inside the function
# via a classification_period precheck — re-runs against the same period
# return `was_noop: true` and change no rows.
#
# Phase 9 M6 — see docs/plans/phase-9-pre-launch-readiness/M6-honest-portfolio-composition.md.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which project to sync'
        required: true
        type: choice
        default: dev
        options: [dev, prod, both]

permissions:
  contents: read

jobs:
  sync-dev:
    name: Sync (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == 'both'
    steps:
      - name: Invoke sync-stock-market-cap (dev)
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
        run: |
          set -e
          echo "POST $SUPABASE_URL/functions/v1/sync-stock-market-cap"
          # Write body to a file + capture HTTP status separately so the
          # response body is surfaced in the log on every outcome — success
          # *or* failure. The previous shape used `--fail-with-body` with
          # `set -e`, which killed the script before the captured body got
          # echoed and hid the `failure_reason` JSON the function returns
          # on 500. See PR #154 follow-up.
          http_status=$(curl -sS -o /tmp/sync-response.json -w '%{http_code}' \
            -X POST "$SUPABASE_URL/functions/v1/sync-stock-market-cap" \
            -H 'Content-Type: application/json' \
            --max-time 120 \
            --data '{}')
          echo "HTTP $http_status"
          jq . /tmp/sync-response.json || cat /tmp/sync-response.json
          if [ "$http_status" -ge 400 ]; then
            echo "::error::sync-stock-market-cap returned HTTP $http_status"
            exit 1
          fi
      - name: Report outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "stock_market_cap_dispatch_completed", distinct_id: "system:sync-stock-market-cap-dev", properties: {"$lib": "github-actions", environment: "dev", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')" \
            || echo "[posthog] capture failed; not failing the job"

  sync-prod:
    name: Sync (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.environment == 'prod' ||
      github.event.inputs.environment == 'both'
    steps:
      - name: Invoke sync-stock-market-cap (prod)
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
        run: |
          set -e
          echo "POST $SUPABASE_URL/functions/v1/sync-stock-market-cap"
          http_status=$(curl -sS -o /tmp/sync-response.json -w '%{http_code}' \
            -X POST "$SUPABASE_URL/functions/v1/sync-stock-market-cap" \
            -H 'Content-Type: application/json' \
            --max-time 120 \
            --data '{}')
          echo "HTTP $http_status"
          jq . /tmp/sync-response.json || cat /tmp/sync-response.json
          if [ "$http_status" -ge 400 ]; then
            echo "::error::sync-stock-market-cap returned HTTP $http_status"
            exit 1
          fi
      - name: Report outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "stock_market_cap_dispatch_completed", distinct_id: "system:sync-stock-market-cap-prod", properties: {"$lib": "github-actions", environment: "production", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')" \
            || echo "[posthog] capture failed; not failing the job"
