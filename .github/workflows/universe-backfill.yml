name: Universe Backfill

# Bulk-syncs OpenFolio composition + metadata for the full active AMFI universe
# (every scheme in scheme_master, not just held funds) so Compare reads
# composition, metrics, and B1 fields with no fetch-fund-snapshot latency.
#
# Chunked and resumable: each function invocation processes at most ~2 pages
# (~600 items), storing cursor state + done markers in app_config for resumption.
# Returns 200 with {phase, composition, metadata, done, stats} or 4xx/5xx on
# page-fetch failure. Scheduled every 15 minutes and runs ~8 sequential
# invocations per run to fit within the 15-minute window.
#
# Done markers prevent re-runs; force=true body param clears them for deliberate
# re-runs (OP-1 backfill remediation).
#
# When to use:
#   - Initial backfill: phase=both (composition + metadata together).
#   - Spot-fix composition only (e.g. after a new disclosure): phase=composition.
#   - Spot-fix metadata only: phase=metadata.
#   - Re-run after completion: {"force": true, "phase": "both"} in body.
#   - After the backfill completes, keep up-to-date via:
#     * monthly openfolio-sync (composition) — already scheduled
#     * daily sync-fund-meta (held-fund metadata) — already scheduled

on:
  schedule:
    # Monthly full refresh trigger (16th @ 01:00 UTC, after OpenFolio's monthly publish on 13–15th).
    # First iteration invokes with {phase:'both', force:true} to begin a full backfill cycle.
    # Subsequent iterations complete the backfill across multiple runs (max 8 invocations/run).
    # Once done-markers are set, the frequent cron below skips with a free (1 app_config read) no-op path.
    - cron: '0 1 16 * *'  # Monthly: 16th @ 01:00 UTC
    # Frequent cron (every 15 min) to resume an in-progress backfill or detect stalled cursors.
    # If monthly refresh is not due (no universe_backfill_refresh_due marker) and both phases
    # are already done, this is a zero-cost short-circuit (one app_config read).
    - cron: '*/15 * * * *'  # Every 15 minutes (resumes or confirms completion)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which project to backfill'
        required: true
        type: choice
        default: dev
        options: [dev, prod, both]
      phase:
        description: 'Which phase to run (default: auto-detect from refresh_due marker)'
        required: false
        type: choice
        options: [composition, metadata, both]
      force:
        description: 'Force re-run (clears done markers)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: universe-backfill-${{ github.event.inputs.environment || 'all' }}
  cancel-in-progress: false

jobs:
  backfill-dev:
    name: Universe Backfill (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15 minutes per run (scheduled every 15 min)
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == 'both'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run universe backfill (dev)
        id: backfill
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY_DEV }}
          FUNCTIONS_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}/functions/v1
          PHASE: ${{ github.event.inputs.phase }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          node << 'EOF'
          const http = require('http');
          const https = require('https');

          const url = new URL('${{ env.FUNCTIONS_URL }}/universe-backfill');
          const protocol = url.protocol === 'https:' ? https : http;

          // On monthly schedule (16th @ 01:00 UTC), force='true' and phase='both' to start a fresh cycle.
          // On frequent schedule (every 15 min), check refresh_due marker to decide if backfill is needed.
          // On workflow_dispatch, respect user's explicit phase/force selection.
          let phase = '${{ env.PHASE }}' || 'both';
          let force = '${{ env.FORCE }}' === 'true';
          let iteration = 0;
          const maxIterations = 8;
          let lastFailed = 0;

          async function invoke() {
            iteration++;
            console.log(`\n[${new Date().toISOString()}] Iteration ${iteration}: phase=${phase} force=${force}`);

            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ phase, force });
              const options = {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                  'Authorization': `Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}`,
                },
              };

              const req = protocol.request(url, options, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  let result;
                  try {
                    result = JSON.parse(data);
                  } catch (e) {
                    console.error(`[${new Date().toISOString()}] Parse error:`, e.message);
                    return reject(new Error(`HTTP ${res.statusCode}: ${data}`));
                  }

                  if (res.statusCode >= 500) {
                    console.error(`[${new Date().toISOString()}] ✗ HTTP ${res.statusCode}:`, result);
                    return reject(new Error(`HTTP ${res.statusCode}: ${result.error || 'unknown error'}`));
                  }

                  if (res.statusCode >= 400) {
                    console.error(`[${new Date().toISOString()}] HTTP ${res.statusCode}:`, result);
                    return reject(new Error(`HTTP ${res.statusCode}: ${result.error || 'unknown error'}`));
                  }

                  console.log(`[${new Date().toISOString()}] Response:`, JSON.stringify(result, null, 2));

                  const current = result.stats?.failed || result.metadata?.stats?.failed || result.composition?.stats?.failed || 0;
                  if (current > lastFailed + 50) {
                    console.error(`[${new Date().toISOString()}] ✗ Failed count grew by ${current - lastFailed}`);
                    return reject(new Error(`Failed count grew by ${current - lastFailed}`));
                  }
                  lastFailed = current;

                  resolve(result);
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          (async function loop() {
            try {
              const result = await invoke();

              if (!result.success) {
                console.error(`[${new Date().toISOString()}] ✗ Backfill failed:`, result.error);
                process.exit(1);
              }

              const done = result.done;
              if (done) {
                console.log(`\n[${new Date().toISOString()}] ✓ Backfill complete!`);
                if (result.phase === 'both') {
                  console.log(`Composition: ${result.composition?.stats ? JSON.stringify(result.composition.stats) : 'N/A'}`);
                  console.log(`Metadata: ${result.metadata?.stats ? JSON.stringify(result.metadata.stats) : 'N/A'}`);
                } else {
                  console.log(`${result.phase} stats:`, result.stats);
                }
                process.exit(0);
              }

              if (iteration >= maxIterations) {
                console.log(`[${new Date().toISOString()}] ℹ Reached max iterations (${maxIterations}) for this run`);
                process.exit(0);
              }

              const cursor = result.cursor || result.composition?.cursor || result.metadata?.cursor || '?';
              console.log(`[${new Date().toISOString()}] ℹ Continuing: cursor=${cursor} (iteration ${iteration}/${maxIterations})`);

              await new Promise(resolve => setTimeout(resolve, 100));
              loop().catch(err => {
                console.error(`[${new Date().toISOString()}] ✗ Unhandled error:`, err.message);
                process.exit(1);
              });
            } catch (err) {
              console.error(`[${new Date().toISOString()}] ✗ Iteration ${iteration} failed:`, err.message);
              process.exit(1);
            }
          })();
          EOF

  backfill-prod:
    name: Universe Backfill (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15 minutes per run (scheduled every 15 min)
    if: |
      github.event.inputs.environment == 'prod' ||
      github.event.inputs.environment == 'both'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run universe backfill (prod)
        id: backfill
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY_PROD }}
          FUNCTIONS_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}/functions/v1
          PHASE: ${{ github.event.inputs.phase || 'both' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          node << 'EOF'
          const http = require('http');
          const https = require('https');

          const url = new URL('${{ env.FUNCTIONS_URL }}/universe-backfill');
          const protocol = url.protocol === 'https:' ? https : http;

          let phase = '${{ env.PHASE }}';
          let force = '${{ env.FORCE }}' === 'true';
          let iteration = 0;
          const maxIterations = 8;
          let lastFailed = 0;

          async function invoke() {
            iteration++;
            console.log(`\n[${new Date().toISOString()}] Iteration ${iteration}: phase=${phase} force=${force}`);

            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ phase, force });
              const options = {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                  'Authorization': `Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}`,
                },
              };

              const req = protocol.request(url, options, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  let result;
                  try {
                    result = JSON.parse(data);
                  } catch (e) {
                    console.error(`[${new Date().toISOString()}] Parse error:`, e.message);
                    return reject(new Error(`HTTP ${res.statusCode}: ${data}`));
                  }

                  if (res.statusCode >= 500) {
                    console.error(`[${new Date().toISOString()}] ✗ HTTP ${res.statusCode}:`, result);
                    return reject(new Error(`HTTP ${res.statusCode}: ${result.error || 'unknown error'}`));
                  }

                  if (res.statusCode >= 400) {
                    console.error(`[${new Date().toISOString()}] HTTP ${res.statusCode}:`, result);
                    return reject(new Error(`HTTP ${res.statusCode}: ${result.error || 'unknown error'}`));
                  }

                  console.log(`[${new Date().toISOString()}] Response:`, JSON.stringify(result, null, 2));

                  const current = result.stats?.failed || result.metadata?.stats?.failed || result.composition?.stats?.failed || 0;
                  if (current > lastFailed + 50) {
                    console.error(`[${new Date().toISOString()}] ✗ Failed count grew by ${current - lastFailed}`);
                    return reject(new Error(`Failed count grew by ${current - lastFailed}`));
                  }
                  lastFailed = current;

                  resolve(result);
                });
              });

              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          (async function loop() {
            try {
              const result = await invoke();

              if (!result.success) {
                console.error(`[${new Date().toISOString()}] ✗ Backfill failed:`, result.error);
                process.exit(1);
              }

              const done = result.done;
              if (done) {
                console.log(`\n[${new Date().toISOString()}] ✓ Backfill complete!`);
                if (result.phase === 'both') {
                  console.log(`Composition: ${result.composition?.stats ? JSON.stringify(result.composition.stats) : 'N/A'}`);
                  console.log(`Metadata: ${result.metadata?.stats ? JSON.stringify(result.metadata.stats) : 'N/A'}`);
                } else {
                  console.log(`${result.phase} stats:`, result.stats);
                }
                process.exit(0);
              }

              if (iteration >= maxIterations) {
                console.log(`[${new Date().toISOString()}] ℹ Reached max iterations (${maxIterations}) for this run`);
                process.exit(0);
              }

              const cursor = result.cursor || result.composition?.cursor || result.metadata?.cursor || '?';
              console.log(`[${new Date().toISOString()}] ℹ Continuing: cursor=${cursor} (iteration ${iteration}/${maxIterations})`);

              await new Promise(resolve => setTimeout(resolve, 100));
              loop().catch(err => {
                console.error(`[${new Date().toISOString()}] ✗ Unhandled error:`, err.message);
                process.exit(1);
              });
            } catch (err) {
              console.error(`[${new Date().toISOString()}] ✗ Iteration ${iteration} failed:`, err.message);
              process.exit(1);
            }
          })();
          EOF
