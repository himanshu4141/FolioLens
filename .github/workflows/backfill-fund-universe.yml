name: Backfill Fund Universe

# Hydrates scheme_master + fund_portfolio_composition + nav_history for the
# entire AMFI scheme universe (~37k codes) so the Compare Funds and Past SIP
# Check tools have sub-50ms read paths instead of on-demand fetches at pick
# time.
#
# Strategy: oldest-first rotation. Each run pulls BACKFILL_BATCH_SIZE schemes,
# processes ~600 in 30-50min, marks them with last_backfill_attempted_at.
# Daily cron rotates through the universe; full coverage in ~60 days at
# default batch size, faster with manual dispatch.

on:
  schedule:
    # 18:00 UTC = 23:30 IST — off-peak, after market close
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which project to backfill'
        required: true
        type: choice
        default: dev
        options: [dev, prod, both]
      batch_size:
        description: 'Schemes per run (default 600)'
        required: false
        type: string
        default: '600'
      offset:
        description: 'Skip first N schemes (for parallel matrix runs)'
        required: false
        type: string
        default: '0'
      skip_nav:
        description: 'Skip NAV history backfill (faster, metadata-only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backfill-dev:
    name: Backfill (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == 'both'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run backfill
        id: backfill
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_DEV }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY_DEV }}
          BACKFILL_BATCH_SIZE: ${{ github.event.inputs.batch_size || '600' }}
          BACKFILL_OFFSET: ${{ github.event.inputs.offset || '0' }}
          BACKFILL_SKIP_NAV: ${{ github.event.inputs.skip_nav == 'true' && '1' || '' }}
        run: node scripts/backfill-fund-universe.mjs
      - name: Report outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.backfill.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "fund_universe_backfill_completed", distinct_id: "system:backfill-dev", properties: {"$lib": "github-actions", environment: "dev", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')" \
            || echo "[posthog] capture failed; not failing the job"

  backfill-prod:
    name: Backfill (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.environment == 'prod' ||
      github.event.inputs.environment == 'both'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run backfill
        id: backfill
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SECRET_KEY_PROD }}
          BACKFILL_BATCH_SIZE: ${{ github.event.inputs.batch_size || '600' }}
          BACKFILL_OFFSET: ${{ github.event.inputs.offset || '0' }}
          BACKFILL_SKIP_NAV: ${{ github.event.inputs.skip_nav == 'true' && '1' || '' }}
        run: node scripts/backfill-fund-universe.mjs
      - name: Report outcome to PostHog
        if: ${{ always() }}
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
          OUTCOME: ${{ steps.backfill.outcome }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then
            echo "[posthog] no key configured, skipping capture"
            exit 0
          fi
          curl -sf -X POST "$POSTHOG_HOST/capture/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg key "$POSTHOG_KEY" \
              --arg outcome "$OUTCOME" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{api_key: $key, event: "fund_universe_backfill_completed", distinct_id: "system:backfill-prod", properties: {"$lib": "github-actions", environment: "prod", outcome: $outcome, trigger: $trigger, workflow_run_url: $run_url}}')" \
            || echo "[posthog] capture failed; not failing the job"
